<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forst-Supertrumpf</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --forstgrun: #154734;
            --sommergrun: #3e822c;
            --fruhlingsgrun: #91ae2d;
            --schwarz: #2d2a26;
            --hintergrund: #87b4c3;
            --karten-bg: #f9faf8;
            --akzent: #d4a017;
            --sieg: #28a745;
            --niederlage: #dc3545;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-image: linear-gradient(#3e822c 22%, #154734 80%);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 5px;
            overflow-x: hidden;
            min-height: 100vh;
        }

        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--forstgrun);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            color: white;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #start-screen img {
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .start-btn {
            padding: 18px 40px;
            background-color: var(--fruhlingsgrun);
            color: var(--forstgrun);
            border: none;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.4rem;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 5px 0 #6e8522;
        }

        .game-board {
            display: none;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            max-width: 350px;
            margin-top: 5px;
        }

.deck-info {                   
    margin: 15px auto 8px auto;       
    font-weight: bold;
    color: var(--forstgrun);
    font-size: 0.75rem;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.6);
    padding: 6px 12px;
    border-radius: 6px;
    box-sizing: border-box;         /* Verhindert, dass Padding die Breite sprengt */
}

        .score-badge {
            background: var(--forstgrun);
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.9rem;
            min-width: 20px;
            text-align: center;
        }

        .score-badge.pop { transform: scale(1.4); }
        #player-side .score-badge { background: var(--sommergrun); }

        .card {
            background-color: var(--karten-bg);
            border-radius: 10px;
            padding: 8px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }

        .card.cpu-hidden {
            background: repeating-linear-gradient(45deg, var(--forstgrun), var(--forstgrun) 10px, #1a5a42 10px, #1a5a42 20px);
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--forstgrun);
        }

        .card.cpu-hidden::after {
            content: attr(data-opponent);
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            border: 1px solid white;
            padding: 4px 12px;
        }

        .header {
            background-color: var(--forstgrun);
            color: white;
            text-align: center;
            padding: 4px;
            border-radius: 4px;
            margin-bottom: 6px;
        }
        .header h2 { margin: 0; font-size: 15px; text-transform: uppercase; }

        .portrait-container { display: flex; justify-content: center; margin-bottom: 6px; }
        .portrait-circle {
            width: 110px; height: 110px;
            border-radius: 50%;
            border: 2px solid var(--sommergrun);
            background: #fff;
            overflow: hidden;
        }
        .portrait-circle img { width: 100%; height: 100%; object-fit: cover; }

        .stat-row { 
            margin-bottom: 3px; 
            padding: 6px;
            border-radius: 5px;
            background: white;
            border: 1px solid #eee;
            cursor: pointer;
        }

        .stat-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            font-size: 13px; 
            font-weight: bold; 
        }

        /* Icon Container */
        .stat-label-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .stat-icon {
            width: 14px;
            height: 14px;
            stroke-width: 2.5;
        }

        .bar-container { background: #eee; height: 5px; border-radius: 2px; margin: 3px 0; }
        .bar-fill { height: 100%; background-color: var(--fruhlingsgrun); }
        .humor-text { font-size: 11px; font-style: italic; color: #666; }

        .winner { background-color: var(--sieg) !important; color: white !important; }
        .loser { background-color: var(--niederlage) !important; color: white !important; }
        .winner .stat-icon, .loser .stat-icon { stroke: white; }
        .winner .humor-text, .loser .humor-text { color: #fff; opacity: 0.9; }

        .controls { margin-top: 10px; width: 100%; max-width: 350px; text-align: center; display: none; }
        .game-button {
            width: 100%;
            padding: 12px;
            background-color: var(--sommergrun);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
        }
#next-btn {
    width: 50%;            /* Breite auf die Hälfte reduziert */
    max-width: 200px;      /* Verhindert, dass er auf Desktop zu groß wird */
    padding: 10px;         /* Etwas schmaler in der Höhe */
    font-size: 14px;       /* Schriftgröße leicht angepasst */
    margin: 15px auto;     /* Zentriert den Button horizontal */
    display: none;         /* Bleibt standardmäßig ausgeblendet */
}
        #message { font-size: 14px; font-weight: bold; color:#fff; margin-bottom: 8px; }

        .portrait-mini { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--sommergrun); overflow: hidden; margin-right: 8px; }
        .portrait-mini img { width: 100%; height: 100%; object-fit: cover; }
        .mini-card-layout { display: flex; align-items: center; margin-top: 5px; }

        @media (min-width: 768px) {
            .game-board { max-width: 700px; flex-direction: row-reverse; align-items: flex-start; margin-top: 40px; }
            .card { width: 300px; }
        }
    </style>
</head>
<body>

<div id="start-screen">
    <img src="cover.png" alt="Forst-Supertrumpf Cover" onerror="this.src='https://via.placeholder.com/400x300?text=Forst-Supertrumpf'">
    <button class="start-btn" onclick="startGame()">Jetzt Spielen</button>
</div>

<div class="game-board" id="game-board">
    <div id="cpu-side">
        <div class="deck-info">
            <span>Gegners Karten: <span id="opponent-name">--</span></span> 
            <span class="score-badge" id="c-count">--</span>
        </div>
        <div id="cpu-card-container"></div>
    </div>

    <div id="player-side">
        <div class="deck-info">
            <span>Deine Karten:</span> 
            <span class="score-badge" id="p-count">--</span>
        </div>
        <div id="player-card-container"></div>
    </div>
</div>

<div class="controls" id="game-controls">
    <div id="message">Wähle einen Wert!</div>
    <button id="next-btn" class="game-button" style="display:none;" onclick="nextRound()">Nächste Runde</button>
</div>

    const gegnerListe = ["DER HOLZDIEB", "DER BORKENKÄFER", "DER WANDERER", "DER MÜLLSÜNDER", "DER RADFAHRER", "JOGGER", "BRENNHOLZWERBER", "Jagdpächter"];
    let playerDeck = [], cpuDeck = [], canPlay = true, aktuellerGegner = "";

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-board').style.display = 'flex';
        document.getElementById('game-controls').style.display = 'block';
        initGame();
    }

    function initGame() {
        let cards = [...mitarbeiterDaten];
        cards.sort(() => Math.random() - 0.5);
        playerDeck = cards.slice(0, Math.floor(cards.length / 2));
        cpuDeck = cards.slice(Math.floor(cards.length / 2));
        

        neuerGegner(); 
        render();
    }

    function neuerGegner() {
        aktuellerGegner = gegnerListe[Math.floor(Math.random() * gegnerListe.length)];
    }

    function createCardHTML(data, isCpuHidden, filterIndex = null) {
        if (isCpuHidden) return `<div class="card cpu-hidden" data-opponent="${aktuellerGegner}"></div>`;
        if (!data) return '';

        const renderStat = (s, i, isMini) => {
            const iconName = iconMap[s.l] || "circle";
            return `
                <div class="stat-row" ${!isMini ? `onclick="playTurn(${i})"` : ''}>
                    <div class="stat-header">
                        <div class="stat-label-group">
                            <i data-lucide="${iconName}" class="stat-icon"></i>
                            <span>${s.l}</span>
                        </div>
                        <span>${s.v}%</span>
                    </div>
                    <div class="bar-container"><div class="bar-fill" style="width:${s.v}%"></div></div>
                    <div class="humor-text">${s.t}</div>
                </div>
            `;
        };

        if (filterIndex !== null) {
            return `
                <div class="card">
                    <div class="header"><h2>${data.titel}</h2></div>
                    <div class="mini-card-layout">
                        <div class="portrait-mini"><img src="${data.bildUrl}" onerror="this.src='https://via.placeholder.com/50'"></div>
                        <div style="flex-grow:1">${renderStat(data.stats[filterIndex], 0, true)}</div>
                    </div>
                </div>`;
        }

        const statsHTML = data.stats.map((s, i) => renderStat(s, i, false)).join('');

        return `
            <div class="card">
                <div class="header"><h2>${data.titel}</h2></div>
                <div class="portrait-container"><div class="portrait-circle"><img src="${data.bildUrl}" onerror="this.src='https://via.placeholder.com/100'"></div></div>
                <div class="stats-area">${statsHTML}</div>
            </div>`;
    }

    function playTurn(statIndex) {
        if (!canPlay) return;
        canPlay = false;

        const pCard = playerDeck[0];
        const cCard = cpuDeck[0];
        const pVal = pCard.stats[statIndex].v;
        const cVal = cCard.stats[statIndex].v;

        document.getElementById('cpu-card-container').innerHTML = createCardHTML(cCard, false, statIndex);

        const pRows = document.querySelectorAll('#player-side .stat-row');
        const cRows = document.querySelectorAll('#cpu-side .stat-row');
        const msgEl = document.getElementById('message');

        if (pVal > cVal) {
            msgEl.textContent = "Rundensieg!";
            pRows[statIndex].classList.add('winner');
            if(cRows[0]) cRows[0].classList.add('loser');
            playerDeck.push(playerDeck.shift(), cpuDeck.shift());
        } else if (cVal > pVal) {
            msgEl.textContent = "Stich verloren!";
            pRows[statIndex].classList.add('loser');
            if(cRows[0]) cRows[0].classList.add('winner');
            cpuDeck.push(cpuDeck.shift(), playerDeck.shift());
        } else {
            msgEl.textContent = "Gleichstand!";
            playerDeck.push(playerDeck.shift());
            cpuDeck.push(cpuDeck.shift());
        }

        lucide.createIcons();
        document.getElementById('next-btn').style.display = "block";
        updateCounts();
    }

    function nextRound() {
        if (playerDeck.length === 0 || cpuDeck.length === 0) {
            alert(playerDeck.length === 0 ? "Game Over!" : "Gewonnen!");
            location.reload(); 
            return;
        }
        canPlay = true;
        document.getElementById('next-btn').style.display = "none";
        document.getElementById('message').textContent = "Wähle einen Wert...";
        
        // HIER WAR DER FEHLER: neuerGegner() wurde entfernt.
        
        render();
    }

    function updateCounts() {
        const pBadge = document.getElementById('p-count');
        const cBadge = document.getElementById('c-count');
        pBadge.classList.add('pop');
        cBadge.classList.add('pop');
        pBadge.textContent = playerDeck.length;
        cBadge.textContent = cpuDeck.length;
        setTimeout(() => { pBadge.classList.remove('pop'); cBadge.classList.remove('pop'); }, 200);
    }

    function render() {
        // Name im Header aktualisieren
        document.getElementById('opponent-name').textContent = aktuellerGegner;
        
        document.getElementById('player-card-container').innerHTML = createCardHTML(playerDeck[0], false);
        document.getElementById('cpu-card-container').innerHTML = createCardHTML(null, true);
        lucide.createIcons();
        updateCounts();
    }
</script>
